JSDOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z Shadow Legend</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #00ffcc;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: #00ffcc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 999;
  text-shadow: 0 0 10px #00ffcc;
}

/* CARD */
.card {
  width: 90%;
  max-width: 360px;
  margin: auto;
  margin-top: 20px;
  padding: 18px;
  border-radius: 12px;
  background: rgba(0,0,0,0.85);
  box-shadow: 0 0 20px #00ffcc;
  display: flex;
  flex-direction: column;
  justify-content: space-between;

  transform: translateY(40px);
  opacity: 0;
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* DP */
.dp {
  width: 22vw;
  max-width: 90px;
  height: 22vw;
  max-height: 90px;
  border-radius: 50%;
  border: 2px solid #00ffcc;
  margin-bottom: 12px;
  box-shadow: 0 0 20px #00ffcc;
}

/* TEXT */
.glow {
  text-shadow: 0 0 5px #00ffcc, 0 0 15px #00ffcc;
  animation: pulse 2s infinite alternate;
}

@keyframes pulse {
  from { text-shadow: 0 0 5px #00ffcc; }
  to { text-shadow: 0 0 25px #00ffff; }
}

.line {
  margin: 12px 0;
  font-size: 3.5vw;
  max-font-size: 14px;
}

/* CURSOR */
.cursor::after {
  content: "|";
  animation: blink 1s infinite;
}
@keyframes blink {
  0%,50%,100% {opacity:1;}
  25%,75% {opacity:0;}
}

/* BUTTON */
.tg-btn {
  display: block;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
  background: #0088cc;
  color: white;
  text-align: center;
  font-size: 14px;
  transition: 0.3s;
}
.tg-btn:hover {
  background: #00ffff;
  color: black;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="loader">🔐 Accessing System...</div>

<div class="card" id="main" style="display:none;">

  <div>
    <img src="dp.png" class="dp">
    <h3 class="glow">𓆩 Z Shadow Legend 𓆪</h3>
    <div id="typing" class="glow cursor"></div>
  </div>

  <div>
    <a class="tg-btn" href="https://t.me/Zshadow_legend" target="_blank">
      Contact 𓆩 Z Shadow Legend 𓆪
    </a>
  </div>

</div>

<script>
// LOADER
setTimeout(() => {
  document.getElementById("loader").innerHTML = "✅ ACCESS GRANTED";
}, 2000);

setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "flex";
}, 3500);

// TYPING
const lines = [
  "👤 Name : Prince",
  "🎂 Age : 22",
  "🎉 Birthday : 19 August 😏",
  "📍 From : Gujarat, India",
  "📱 Favourite Apps : Telegram | Termux",
  "💻 Skills : Website Making (HTML + CSS + JS , Frontend developer)",
  "🎯 Goal : Hacker Mindset 😈",
  "💬 Username : @Zshadow_legend",
  "❤️ GF : Hoti to batata kya 😏",
  "🎮 Hobbies : Coding | Exploring | Risky Stuff 😏",
  "⚡ > Kaam ho to yaad karna...",
  "",
  "💀 Silent but Dangerous"
];

let i = 0;
function typeLines() {
  if (i < lines.length) {
    let div = document.createElement("div");
    div.className = "line";
    document.getElementById("typing").appendChild(div);

    let j = 0;
    function typeChar() {
      if (j < lines[i].length) {
        div.innerHTML += lines[i].charAt(j);
        j++;
        setTimeout(typeChar, 18);
      } else {
        i++;
        setTimeout(typeLines, 150);
      }
    }
    typeChar();
  }
}
typeLines();

// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}
resize();
window.addEventListener("resize", resize);

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(draw, 35);
</script>

</body>
</html>
