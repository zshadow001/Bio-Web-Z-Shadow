<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Z Shadow Legend</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #00ffcc;
}

/* MATRIX BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: #00ffcc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  z-index: 999;
  text-shadow: 0 0 10px #00ffcc;
}

/* CARD */
.card {
  width: 320px;
  height: 650px;
  margin: auto;
  margin-top: 25px;
  padding: 20px;
  border-radius: 12px;
  background: rgba(0,0,0,0.85);
  box-shadow: 0 0 20px #00ffcc;
  display: flex;
  flex-direction: column;
  justify-content: space-between;

  transform: translateX(-100%);
  animation: slideIn 1s forwards;
}

@keyframes slideIn {
  to { transform: translateX(0); }
}

/* DP */
.dp {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #00ffcc;
  margin-bottom: 15px;
  box-shadow: 0 0 25px #00ffcc;
}

/* GLOW TEXT */
.glow {
  text-shadow: 0 0 5px #00ffcc, 0 0 15px #00ffcc;
  animation: pulse 2s infinite alternate;
}

@keyframes pulse {
  from { text-shadow: 0 0 5px #00ffcc; }
  to { text-shadow: 0 0 25px #00ffff; }
}

.line {
  margin: 14px 0;
  font-size: 14px;
}

/* CARD HOVER */
.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 40px #00ffff;
  transition: 0.3s;
}

/* CURSOR */
.cursor::after {
  content: "|";
  animation: blink 1s infinite;
}
@keyframes blink {
  0%,50%,100% {opacity:1;}
  25%,75% {opacity:0;}
}

/* BUTTON */
.tg-btn {
  display: block;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
  background: #0088cc;
  color: white;
  text-align: center;
  transition: 0.3s;
}
.tg-btn:hover {
  background: #00ffff;
  color: black;
}
</style>
</head>

<body>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<!-- LOADER -->
<div id="loader">🔐 Accessing System...</div>

<!-- MAIN CARD -->
<div class="card" id="main" style="display:none;">

  <div>
    <!-- LOCAL DP -->
    <img src="dp.png" class="dp">

    <h3 class="glow">𓆩 Z Shadow Legend 𓆪</h3>
    <div id="typing" class="glow cursor"></div>
  </div>

  <div>
    <a class="tg-btn" href="https://t.me/Zshadow_legend" target="_blank">
      Contact 𓆩 Z Shadow Legend 𓆪
    </a>
  </div>

</div>

<script>
// LOADER
setTimeout(() => {
  document.getElementById("loader").innerHTML = "✅ ACCESS GRANTED";
}, 2000);

setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "flex";
}, 3500);

// TYPING TEXT
const lines = [
  "👤 Name : Prince",
  "🎂 Age : 22",
  "🎉 Birthday : 19 August 😏",
  "📍 From : Gujarat, India",
  "📱 Favourite Apps : Telegram | Termux",
  "💻 Skills : Website Making (HTML + CSS + JS)",
  "🎯 Goal : Hacker Mindset 😈",
  "💬 Username : @Zshadow_legend",
  "❤️ GF : Hoti to batata kya 😏",
  "🎮 Hobbies : Coding | Exploring | Risky Stuff 😏",
  "⚡ > Kaam ho to yaad karna...",
  "",
  "💀 Silent but Dangerous"
];

let i = 0;
function typeLines() {
  if (i < lines.length) {
    let div = document.createElement("div");
    div.className = "line";
    document.getElementById("typing").appendChild(div);

    let j = 0;
    function typeChar() {
      if (j < lines[i].length) {
        div.innerHTML += lines[i].charAt(j);
        j++;
        setTimeout(typeChar, 18);
      } else {
        i++;
        setTimeout(typeLines, 150);
      }
    }
    typeChar();
  }
}
typeLines();

// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for(let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(draw, 35);
</script>

</body>
  </html>
